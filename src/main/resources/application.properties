spring.application.name=traders

# H2 Database configuration - persists to a file under ./data/
spring.datasource.url=jdbc:h2:mem:balaji_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable H2 Console for debug/admin inspections
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# File upload settings for farmer photos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom Security & Upload Directories
app.security.username=admin
app.security.password=balaji123
app.upload.dir=./data/photos

# Defer datasource initialization so data.sql seeds after Hibernate creates tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
