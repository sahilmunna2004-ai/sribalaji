spring.application.name=traders

# Remote PostgreSQL configuration for local development
spring.datasource.url=jdbc:postgresql://pg-390c4809-sahilmunna2004-f156.b.aivencloud.com:28785/defaultdb?sslmode=require
spring.datasource.username=avnadmin
spring.datasource.password=REPLACE_WITH_AIVEN_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.sql.init.mode=never

# Flyway Configuration
# Keep the SQL migration files under src/main/resources/db/migration so the schema stays versioned
# even if the database connection is temporarily unavailable.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# File upload settings for farmer photos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

